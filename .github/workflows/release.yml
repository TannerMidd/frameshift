name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Stamp version from tag
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}".TrimStart('v')
          "VERSION = `"$v`"" | Out-File -FilePath elite/_version.py -Encoding ascii
          Write-Host "Stamped version $v"

      - name: Build EliteTrader.exe
        run: >
          pyinstaller --noconfirm --onefile --windowed --name EliteTrader
          --add-data "ui;ui"
          --hidden-import webview.platforms.winforms
          --hidden-import webview.platforms.edgechromium
          app.py

      - name: Checksum
        shell: pwsh
        run: |
          $h = (Get-FileHash dist/EliteTrader.exe -Algorithm SHA256).Hash.ToLower()
          $h | Out-File -FilePath dist/EliteTrader.exe.sha256 -Encoding ascii -NoNewline
          Write-Host "sha256 $h"

      - name: Smoke test (headless server answers)
        shell: pwsh
        run: |
          Start-Process -FilePath dist\EliteTrader.exe -ArgumentList "--headless","--port","8699"
          Start-Sleep -Seconds 12
          $r = Invoke-WebRequest -UseBasicParsing http://127.0.0.1:8699/api/state -TimeoutSec 15
          if ($r.StatusCode -ne 200) { throw "exe did not serve /api/state" }
          $ui = Invoke-WebRequest -UseBasicParsing http://127.0.0.1:8699/ -TimeoutSec 15
          if ($ui.StatusCode -ne 200) { throw "exe did not serve the UI" }

      - name: Publish release with exe attached
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/EliteTrader.exe
            dist/EliteTrader.exe.sha256
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
