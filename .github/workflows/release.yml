name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Run test suite
        shell: pwsh
        run: |
          $env:PYTHONIOENCODING = "utf-8"
          $failed = @()
          Get-ChildItem tests -Filter "test_*.py" | ForEach-Object {
            Write-Host "== $($_.Name)"
            python $_.FullName
            if ($LASTEXITCODE -ne 0) { $failed += $_.Name }
          }
          if ($failed.Count -gt 0) { throw "Failing tests: $($failed -join ', ')" }

      - name: Stamp version from tag
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}".TrimStart('v')
          "VERSION = `"$v`"" | Out-File -FilePath elite/_version.py -Encoding ascii
          $fvers = (($v.Split('.') + @('0','0','0','0'))[0..3]) -join ','
          (Get-Content packaging/version_info.txt -Raw).Replace('@FILEVERS@', $fvers).Replace('@VERSION@', $v) |
            Out-File -FilePath version_info.rendered.txt -Encoding ascii
          Write-Host "Stamped version $v (filevers $fvers)"

      # A proper Windows version resource (ProductName/version/etc.) lowers the
      # antivirus heuristic score for the unsigned exe. It is not a full fix -
      # code signing is - but it is a free, safe improvement.
      - name: Build Frameshift.exe
        run: >
          pyinstaller --noconfirm --onefile --windowed --name Frameshift
          --version-file version_info.rendered.txt
          --icon assets/Frameshift.ico
          --add-data "ui;ui"
          --add-data "elite/data/engineering_catalog.json.gz;elite/data"
          --add-data "THIRD_PARTY_NOTICES.md;."
          --hidden-import webview.platforms.winforms
          --hidden-import webview.platforms.edgechromium
          app.py

      # Pre-rename installs (Elite Trader, <= v1.16.0) look for an asset named
      # exactly "EliteTrader.exe" - publishing the same binary under both names
      # keeps their auto-update working. Remove the legacy copy only if the
      # old-install population ever demonstrably hits zero.
      - name: Checksums + legacy-named copy
        shell: pwsh
        run: |
          Copy-Item dist/Frameshift.exe dist/EliteTrader.exe
          foreach ($name in @("Frameshift.exe", "EliteTrader.exe")) {
            $h = (Get-FileHash dist/$name -Algorithm SHA256).Hash.ToLower()
            $h | Out-File -FilePath "dist/$name.sha256" -Encoding ascii -NoNewline
            Write-Host "sha256 $name $h"
          }

      - name: Smoke test (headless server answers)
        shell: pwsh
        run: |
          Start-Process -FilePath dist\Frameshift.exe -ArgumentList "--headless","--port","8699"
          Start-Sleep -Seconds 12
          $r = Invoke-WebRequest -UseBasicParsing http://127.0.0.1:8699/api/state -TimeoutSec 15
          if ($r.StatusCode -ne 200) { throw "exe did not serve /api/state" }
          $ui = Invoke-WebRequest -UseBasicParsing http://127.0.0.1:8699/ -TimeoutSec 15
          if ($ui.StatusCode -ne 200) { throw "exe did not serve the UI" }

      - name: Publish release with exe attached
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: |
            dist/Frameshift.exe
            dist/Frameshift.exe.sha256
            dist/EliteTrader.exe
            dist/EliteTrader.exe.sha256
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
