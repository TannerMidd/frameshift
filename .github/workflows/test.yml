name: Test

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pinned dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall -q app.py elite tests

      - name: Check browser JavaScript syntax
        run: node --check ui/app.js

      - name: Run test suite
        shell: pwsh
        run: |
          $env:PYTHONIOENCODING = "utf-8"
          $failed = @()
          Get-ChildItem tests -Filter "test_*.py" | Sort-Object Name | ForEach-Object {
            Write-Host "== $($_.Name)"
            python $_.FullName
            if ($LASTEXITCODE -ne 0) { $failed += $_.Name }
          }
          if ($failed.Count -gt 0) { throw "Failing tests: $($failed -join ', ')" }
